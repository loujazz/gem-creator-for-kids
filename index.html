<!DOCTYPE html>
<html lang="it" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Costruisci il tuo Gem</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap');
  :root{
    --bg:#f1f3f4;--card:#fff;--ink:#202124;--muted:#5f6368;--border:#dadce0;
    --blue:#1a73e8;--blue-light:#e8f0fe;--blue-dark:#1557b0;
    --green:#188038;--teal:#00897b;--orange:#e37400;
    --radius:8px;--radius-lg:12px;
    --s1:0 1px 2px rgba(60,64,67,.30),0 1px 3px rgba(60,64,67,.15);
    --s2:0 2px 6px rgba(60,64,67,.20),0 1px 2px rgba(60,64,67,.10);
    --s3:0 4px 12px rgba(60,64,67,.15),0 2px 4px rgba(60,64,67,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
  .header{display:flex;align-items:center;gap:.75rem;background:var(--blue);padding:.85rem 1.5rem;position:sticky;top:0;z-index:10;flex-shrink:0}
  .header-logo{width:36px;height:36px;object-fit:contain;flex-shrink:0;border-radius:50%}
  .header h1{font-family:'Google Sans',sans-serif;font-size:1.1rem;font-weight:500;color:#fff}
  .header p{font-size:.78rem;color:rgba(255,255,255,.8);margin-top:.1rem}
  .app{max-width:600px;margin:0 auto;padding:1.5rem 1rem 2rem;width:100%;transition:zoom .15s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .progress-wrap{display:flex;gap:4px;margin-bottom:1.25rem;padding:0 .25rem}
  .progress-dot{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s}
  .progress-dot.done{background:var(--green)}.progress-dot.active{background:var(--blue)}
  .card{background:var(--card);border-radius:var(--radius-lg);padding:1.5rem;box-shadow:var(--s1);margin-bottom:1rem;animation:fadeUp .25s ease;border:1px solid var(--border)}
  .intro-banner{background:var(--blue);border-radius:var(--radius-lg);padding:1.75rem 1.5rem;color:#fff;margin-bottom:1rem;box-shadow:var(--s2);animation:fadeUp .3s ease}
  .intro-banner-top{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
  .intro-banner h2{font-family:'Google Sans',sans-serif;font-size:1.2rem;font-weight:500}
  .intro-banner p{font-size:.92rem;line-height:1.7;color:rgba(255,255,255,.92)}
  .info-card{background:var(--card);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem;box-shadow:var(--s1);border:1px solid var(--border);border-left:4px solid var(--teal);animation:fadeUp .35s ease}
  .info-label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:.5rem;font-family:'Google Sans',sans-serif}
  .info-card p{font-size:.93rem;line-height:1.7}
  .steps-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.25rem;animation:fadeUp .4s ease}
  .step-chip{background:var(--card);border-radius:var(--radius);padding:.75rem 1rem;border:1px solid var(--border);display:flex;align-items:center;gap:.65rem;box-shadow:var(--s1)}
  .step-num{width:26px;height:26px;border-radius:50%;background:var(--blue-light);color:var(--blue);font-size:.82rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Google Sans',sans-serif}
  .step-text{font-size:.85rem;font-weight:500}
  .q-label{display:inline-flex;align-items:center;background:var(--blue-light);color:var(--blue);font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.25rem .65rem;border-radius:4px;margin-bottom:.85rem;font-family:'Google Sans',sans-serif}
  .q-text{font-family:'Google Sans',sans-serif;font-size:1.15rem;font-weight:500;margin-bottom:.4rem;line-height:1.35}
  .q-hint{font-size:.87rem;color:var(--muted);margin-bottom:1.1rem;line-height:1.6}
  textarea,input[type=text]{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;font-size:.95rem;font-family:'Roboto',sans-serif;color:var(--ink);background:#fff;resize:vertical;outline:none;transition:border-color .15s,box-shadow .15s;line-height:1.6}
  textarea:focus,input[type=text]:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,115,232,.2)}
  .style-options{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem}
  .style-opt{border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;cursor:pointer;transition:all .15s;background:#fff;text-align:left;font-family:'Roboto',sans-serif;box-shadow:var(--s1)}
  .style-opt:hover{border-color:var(--blue);background:var(--blue-light)}
  .style-opt.selected{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 2px rgba(26,115,232,.2)}
  .style-opt-emoji{font-size:1.2rem;display:block;margin-bottom:.3rem}
  .style-opt-label{font-size:.87rem;font-weight:500;display:block;margin-bottom:.15rem}
  .style-opt-desc{font-size:.77rem;color:var(--muted);line-height:1.4;display:block}
  .style-note{font-size:.8rem;color:var(--muted);margin-top:.25rem}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;gap:.75rem}
  .btn{border:none;border-radius:4px;padding:.6rem 1.25rem;font-size:.9rem;font-weight:500;cursor:pointer;font-family:'Google Sans',sans-serif;transition:all .15s;letter-spacing:.02em}
  .btn-primary{background:var(--blue);color:#fff;flex:1;box-shadow:var(--s1)}
  .btn-primary:hover{background:var(--blue-dark);box-shadow:var(--s2)}
  .btn-primary:disabled{background:var(--border);color:var(--muted);box-shadow:none;cursor:default}
  .btn-back{background:transparent;color:var(--blue);border:1px solid var(--border);padding:.6rem 1rem}
  .btn-back:hover{background:var(--blue-light);border-color:var(--blue)}
  .btn-start{width:100%;background:var(--blue);color:#fff;font-size:.95rem;padding:.85rem;border-radius:4px;box-shadow:var(--s2);letter-spacing:.02em;animation:fadeUp .45s ease}
  .btn-start:hover{background:var(--blue-dark);box-shadow:var(--s3)}
  .result-banner{background:var(--green);border-radius:var(--radius-lg);padding:1.5rem;color:#fff;margin-bottom:1rem;text-align:center;box-shadow:var(--s2);animation:fadeUp .25s ease}
  .result-banner h2{font-family:'Google Sans',sans-serif;font-size:1.25rem;font-weight:500;margin-bottom:.3rem}
  .result-banner p{font-size:.9rem;opacity:.92;line-height:1.6}
  .prompt-box{background:#202124;border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem;box-shadow:var(--s2);border:1px solid #3c4043;animation:fadeUp .3s ease}
  .prompt-toolbar{background:#2d2e30;padding:.65rem 1.1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #3c4043}
  .prompt-toolbar span{color:#9aa0a6;font-size:.75rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;font-family:'Google Sans',sans-serif}
  .btn-copy{background:var(--blue);color:#fff;border:none;border-radius:4px;padding:.35rem .85rem;font-size:.82rem;font-weight:500;cursor:pointer;font-family:'Google Sans',sans-serif;transition:all .15s}
  .btn-copy:hover{background:var(--blue-dark)}.btn-copy.copied{background:var(--green)}
  .prompt-text{padding:1.1rem 1.25rem;color:#e8eaed;font-size:.88rem;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:320px;overflow-y:auto;font-family:'Roboto',sans-serif;user-select:text}
  .notice-card{background:var(--card);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem;border:1px solid var(--border);box-shadow:var(--s1);display:flex;gap:.85rem;align-items:flex-start}
  .notice-card.tip{border-left:4px solid var(--blue);animation:fadeUp .35s ease}
  .notice-card.warn{border-left:4px solid var(--orange);animation:fadeUp .4s ease}
  .notice-icon{font-size:1.2rem;flex-shrink:0;margin-top:.05rem}
  .notice-card p{font-size:.9rem;line-height:1.65}
  .notice-card strong{font-weight:500}
  .btn-restart{width:100%;background:#fff;color:var(--blue);border:1px solid var(--border);border-radius:4px;padding:.75rem;font-size:.9rem;font-weight:500;cursor:pointer;font-family:'Google Sans',sans-serif;transition:all .15s;box-shadow:var(--s1);animation:fadeUp .45s ease}
  .btn-restart:hover{background:var(--blue-light);border-color:var(--blue)}
  .answers-recap{background:var(--card);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;border:1px solid var(--border);box-shadow:var(--s1);animation:fadeUp .25s ease}
  .recap-label{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.65rem;font-family:'Google Sans',sans-serif}
  .recap-item{font-size:.87rem;padding:.4rem 0;border-bottom:1px solid var(--bg);line-height:1.5}
  .recap-item:last-child{border-bottom:none}
  .recap-item .rq{color:var(--muted);font-size:.8rem;margin-bottom:.15rem}
  .recap-item .ra{color:var(--ink);font-weight:500}
  .footer{background:var(--card);border-top:1px solid var(--border);padding:1rem 1.5rem;text-align:center;font-size:.78rem;color:var(--muted);line-height:1.6;flex-shrink:0}
  .footer em{font-style:italic}
  /* ZOOM */
  .zoom-controls{position:fixed;bottom:1.5rem;right:1.5rem;display:flex;flex-direction:column;align-items:center;gap:.4rem;z-index:200;transition:bottom .15s}
  .zoom-btn{width:44px;height:44px;border-radius:50%;border:none;background:var(--blue);color:#fff;font-size:1.3rem;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(26,115,232,.4),0 1px 3px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
  .zoom-btn:hover{background:var(--blue-dark);box-shadow:0 4px 14px rgba(26,115,232,.5);transform:scale(1.08)}
  .zoom-btn:active{transform:scale(.94)}
  .zoom-label{background:rgba(32,33,36,.78);color:#fff;font-size:.7rem;border-radius:4px;padding:.2rem .5rem;font-family:'Google Sans',sans-serif;letter-spacing:.03em;min-width:36px;text-align:center}
  @media(max-width:480px){.zoom-controls{display:none}}
  .zoom-header{display:none}
  @media(max-width:480px){.zoom-header{display:flex}}

  /* ROLE SELECTION */
  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem}
  .role-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1rem;cursor:pointer;transition:all .15s;box-shadow:var(--s1);text-align:left}
  .role-card:hover{border-color:var(--blue);background:var(--blue-light)}
  .role-card.selected{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 3px rgba(26,115,232,.2)}
  .role-card-emoji{font-size:1.75rem;display:block;margin-bottom:.5rem}
  .role-card-title{font-family:'Google Sans',sans-serif;font-size:.97rem;font-weight:700;color:var(--ink);display:block;margin-bottom:.25rem}
  .role-card-desc{font-size:.78rem;color:var(--muted);line-height:1.45;display:block}
  /* OPTIONS buttons */
  .opt-group{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.5rem}
  .opt-btn{border:1px solid var(--border);border-radius:var(--radius);padding:.6rem 1rem;cursor:pointer;transition:all .15s;background:#fff;text-align:left;font-family:'Roboto',sans-serif;font-size:.9rem;color:var(--ink);box-shadow:var(--s1)}
  .opt-btn:hover{border-color:var(--blue);background:var(--blue-light)}
  .opt-btn.selected{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 2px rgba(26,115,232,.2);font-weight:500}
</style>
</head>

function t(key, ...args) {
  const val = (T[lang] || T.it)[key];
  if (typeof val === 'function') return val(...args);
  return val !== undefined ? val : (T.it[key] || key);
}

function updateLangButtons() {
  const btnIt = document.getElementById('btn-it');
  const btnEn = document.getElementById('btn-en');
  if (btnIt) {
    btnIt.style.background = lang === 'it' ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.15)';
    btnIt.style.color = lang === 'it' ? '#1a73e8' : '#fff';
    btnIt.style.border = lang === 'it' ? '1px solid rgba(255,255,255,0.7)' : '1px solid rgba(255,255,255,0.3)';
  }
  if (btnEn) {
    btnEn.style.background = lang === 'en' ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.15)';
    btnEn.style.color = lang === 'en' ? '#1a73e8' : '#fff';
    btnEn.style.border = lang === 'en' ? '1px solid rgba(255,255,255,0.7)' : '1px solid rgba(255,255,255,0.3)';
  }
  const htmlEl = document.getElementById('html-root');
  if (htmlEl) htmlEl.lang = lang;
  const titleEl = document.getElementById('page-title');
  if (titleEl) titleEl.textContent = lang === 'it' ? 'Costruisci il tuo Gem' : 'Build your Gem';
  const headerTitle = document.getElementById('header-title');
  if (headerTitle) headerTitle.textContent = lang === 'it' ? 'Costruisci il tuo Gem' : 'Build your Gem';
  const headerSub = document.getElementById('header-sub');
  if (headerSub) headerSub.textContent = lang === 'it' ? 'Crea il tuo assistente AI personalizzato' : 'Create your personalized AI assistant';
  const footerEl = document.getElementById('footer-text');
  if (footerEl) footerEl.innerHTML = t('footerText');
}

function setLang(l) {
  lang = l;
  localStorage.setItem('gem-lang', l);
  ROLES = lang === 'it' ? ROLES_IT : ROLES_EN;
  updateLangButtons();
  render();
}

const SCALES = [0.7, 0.8, 0.9, 1.0, 1.1, 1.2, 1.35, 1.5];
let zoomIdx = 3;
function zoom(dir) {
  zoomIdx = Math.max(0, Math.min(SCALES.length - 1, zoomIdx + dir));
  const s = SCALES[zoomIdx];
  document.getElementById('app').style.zoom = s;
  const label = Math.round(s * 100) + '%';
  const d = document.getElementById('zoom-label');
  const m = document.getElementById('zoom-label-mobile');
  if (d) d.textContent = label;
  if (m) m.textContent = label;
}

let ROLES = lang === 'it' ? ROLES_IT : ROLES_EN;

// ── State ─────────────────────────────────────────────────────
let state = {
  phase: 'intro',      // intro | roleSelect | questions | result
  roleId: null,
  qIndex: 0,
  answers: {},
  currentAnswer: '',
  selectedStyles: [],
  selectedOption: null
};

// ── Helpers ───────────────────────────────────────────────────
function escHtml(s) {
  if (!s) return '';
  if (Array.isArray(s)) s = s.join(', ');
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function currentRole() { return ROLES[state.roleId]; }
function currentQuestions() { return currentRole()?.questions || []; }

function canGoNext() {
  const qs = currentQuestions();
  if (!qs.length) return false;
  const q = qs[state.qIndex];
  if (q.type === 'style') return true;
  if (q.type === 'option') return !!state.selectedOption;
  return state.currentAnswer.trim().length > 0;
}

function handleInput(v) {
  state.currentAnswer = v;
  const b = document.querySelector('.btn-primary');
  if (b) b.disabled = !canGoNext();
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey && canGoNext()) { e.preventDefault(); goNext(); }
}

function toggleStyle(id) {
  const i = state.selectedStyles.indexOf(id);
  if (i >= 0) state.selectedStyles.splice(i, 1); else state.selectedStyles.push(id);
  document.querySelectorAll('.style-opt').forEach(b => {
    const m = b.getAttribute('onclick').match(/'([^']+)'/);
    if (m) b.classList.toggle('selected', state.selectedStyles.includes(m[1]));
  });
}

function selectOption(id) {
  state.selectedOption = id;
  document.querySelectorAll('.opt-btn').forEach(b => {
    const m = b.getAttribute('onclick').match(/'([^']+)'/);
    if (m) b.classList.toggle('selected', m[1] === id);
  });
  const btn = document.querySelector('.btn-primary');
  if (btn) btn.disabled = false;
}

function selectRole(id) {
  state.roleId = id;
  document.querySelectorAll('.role-card').forEach(c => {
    const m = c.getAttribute('onclick').match(/'([^']+)'/);
    if (m) c.classList.toggle('selected', m[1] === id);
  });
  document.querySelector('.btn-primary').disabled = false;
}

// ── Copy ─────────────────────────────────────────────────────
function copyPrompt() {
  const el = document.getElementById('prompt-text');
  if (!el) return;
  const text = el.value !== undefined ? el.value : (el.innerText || el.textContent || '');
  const ok = () => {
    const b = document.getElementById('copy-btn');
    if (b) { b.textContent = t('copiedBtn'); b.classList.add('copied'); setTimeout(() => { b.textContent = t('copyBtn'); b.classList.remove('copied'); }, 2500); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(ok).catch(() => fb(text, ok));
  } else { fb(text, ok); }
}
function fb(text, ok) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
  try { if (document.execCommand('copy')) ok(); } catch(e) {}
  document.body.removeChild(ta);
}

/SXY6b2f8AKnLw9ys9GbjhNePseiwedf8AaBnD++6v/wCKn/0lNbO+bKy0njl0v3Wo/JH16b2fCnLw9z4tGbnjOPj7HpA+e8vbKzj2ry7t7ePfVqKK+J5musdxu6TVxi9/VT3UriTT9mpx7bb1b1ZUq6cx/wDXR739vUsQ0Xf86ncvueiMS4gZTse0pYrCvJfhoRc/iuXxOrYtxftoaxwvCqlV9J159le5amnwaa50wxCrshlHsXvmbGjo9aU9ss5dr9jtmN8Q80YmpQ+nuzpP8Fsux/m+98TqtSc6k5TqTlOcnq5SerbIg524u69zLWrTcn1s29G3pUFlTil2AAFcmAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/9k=" alt="Gem" style="width:48px;height:48px;border-radius:50%;flex-shrink:0">
          <h2>${t('introBannerTitle')}</h2>
        </div>
        <p>${t('introBannerText')}</p>
      </div>
      <div class="info-card">
        <div class="info-label">${t('infoLabel')}</div>
        <p>${t('infoText')}</p>
      </div>
      <div class="steps-row">
        <div class="step-chip"><div class="step-num">1</div><div class="step-text">${t('step1')}</div></div>
        <div class="step-chip"><div class="step-num">2</div><div class="step-text">${t('step2')}</div></div>
        <div class="step-chip"><div class="step-num">3</div><div class="step-text">${t('step3')}</div></div>
        <div class="step-chip"><div class="step-num">4</div><div class="step-text">${t('step4')}</div></div>
      </div>
      <button class="btn btn-start" onclick="goRoleSelect()">${t('startBtn')}</button>`;
  }

  else if (phase === 'roleSelect') {
    const cards = Object.values(ROLES).map(r => `
      <div class="role-card${roleId===r.id?' selected':''}" onclick="selectRole('${r.id}')">
        <span class="role-card-emoji">${r.emoji}</span>
        <span class="role-card-title">${r.title}</span>
        <span class="role-card-desc">${r.desc}</span>
      </div>`).join('');
    app.innerHTML = `
      <div class="card">
        <div class="q-label">${t('roleSelectLabel')}</div>
        <div class="q-text">${t('roleSelectText')}</div>
        <div class="q-hint" style="margin-bottom:1rem">${t('roleSelectHint')}</div>
        <div class="role-grid">${cards}</div>
        <div class="nav">
          <button class="btn btn-back" onclick="goIntro()">${t('back')}</button>
          <button class="btn btn-primary" onclick="startQuestions()" ${roleId?'':'disabled'}>${t('next')}</button>
        </div>
      </div>`;
  }

  else if (phase === 'questions') {
    const qs = currentQuestions();
    const q = qs[qIndex];
    const total = qs.length;
    const isFirst = qIndex === 0;
    const isLast = qIndex === total - 1;
    const cp = canGoNext();

    const dots = Array.from({length: total}, (_, i) =>
      `<div class="progress-dot${i<qIndex?' done':i===qIndex?' active':''}"></div>`).join('');

    let inp = '';
    if (q.type === 'text') {
      inp = `<input type="text" id="answer-input" value="${escHtml(currentAnswer)}" placeholder="${escHtml(q.placeholder)}" oninput="handleInput(this.value)" onkeydown="handleKeydown(event)"/>`;
    } else if (q.type === 'textarea') {
      inp = `<textarea id="answer-input" rows="3" placeholder="${escHtml(q.placeholder)}" oninput="handleInput(this.value)" onkeydown="handleKeydown(event)">${escHtml(currentAnswer)}</textarea>`;
    } else if (q.type === 'style') {
      const opts = q.options.map(o =>
        `<button class="style-opt${selectedStyles.includes(o.id)?' selected':''}" onclick="toggleStyle('${o.id}')">
          <span class="style-opt-emoji">${o.emoji}</span>
          <span class="style-opt-label">${o.label}</span>
          <span class="style-opt-desc">${o.desc}</span>
        </button>`).join('');
      inp = `<div class="style-options">${opts}</div><p class="style-note">${t('styleNote')}</p>`;
    } else if (q.type === 'option') {
      const opts = q.options.map(o =>
        `<button class="opt-btn${selectedOption===o.id?' selected':''}" onclick="selectOption('${o.id}')">
          <strong>${o.label}</strong><br><span style="font-size:.8rem;color:var(--muted)">${o.desc}</span>
        </button>`).join('');
      inp = `<div class="opt-group">${opts}</div>`;
    }

    const prev = qIndex > 0 ? (() => {
      const items = qs.slice(0, qIndex).map(pq => {
        const v = answers[pq.id];
        if (!v || (Array.isArray(v) && v.length === 0)) return '';
        let d;
        if (Array.isArray(v)) d = v.map(s => (pq.options||[]).find(o=>o.id===s)?.label||s).join(', ');
        else if (pq.type==='option') d = (pq.options||[]).find(o=>o.id===v)?.label||v;
        else d = v;
        return `<div class="recap-item"><div class="rq">${pq.text}</div><div class="ra">${escHtml(d)}</div></div>`;
      }).filter(Boolean).join('');
      return items ? `<div class="answers-recap"><div class="recap-label">${t('recapLabel')}</div>${items}</div>` : '';
    })() : '';

    app.innerHTML = `
      <div class="progress-wrap">${dots}</div>
      <div class="card">
        <div class="q-label">${currentRole().emoji} ${currentRole().title} · ${t('questionOf', qIndex+1, total)}</div>
        <div class="q-text">${q.text}</div>
        <div class="q-hint">${q.hint}</div>
        ${inp}
        <div class="nav">
          ${!isFirst
            ? `<button class="btn btn-back" onclick="goPrev()">${t('back')}</button>`
            : `<button class="btn btn-back" onclick="goRoleSelect()">${t('roleBack')}</button>`}
          <button class="btn btn-primary" onclick="goNext()" ${cp?'':'disabled'}>
            ${isLast ? t('createPrompt') : t('next')}
          </button>
        </div>
      </div>
      ${prev}`;

    const i = document.getElementById('answer-input');
    if (i) setTimeout(() => i.focus(), 80);
  }

  else if (phase === 'result') {
    const role = currentRole();
    const prompt = role.buildPrompt(answers);
    const dots = Array.from({length: currentQuestions().length}, () => '<div class="progress-dot done"></div>').join('');
    app.innerHTML = `
      <div class="progress-wrap">${dots}</div>
      <div class="result-banner">
        <h2>${t('resultTitle')}</h2>
        <p>${t('resultSub', role.emoji, role.title)}</p>
      </div>
      <div class="notice-card" style="border-left:4px solid var(--green);background:#e6f4ea;animation:fadeUp .25s ease;margin-bottom:1rem">
        <span class="notice-icon">✏️</span>
        <p><strong>${t('readFirst')}</strong> ${t('readFirstDesc')}</p>
      </div>
      <div class="prompt-box">
        <div class="prompt-toolbar">
          <span>${t('promptLabel')}</span>
          <button class="btn-copy" id="copy-btn" onclick="copyPrompt()">${t('copyBtn')}</button>
        </div>
        <textarea id="prompt-text" rows="12" style="width:100%;background:#202124;color:#e8eaed;font-size:.88rem;line-height:1.8;font-family:'Roboto',sans-serif;border:none;outline:none;padding:1.1rem 1.25rem;resize:vertical;box-sizing:border-box;white-space:pre-wrap;word-break:break-word">${escHtml(prompt)}</textarea>
      </div>
      <div class="notice-card tip">
        <span class="notice-icon">💡</span>
        <p><strong>${t('howToUse')}</strong> ${t('howToUseDesc')}</p>
      </div>
      <div class="notice-card warn">
        <span class="notice-icon">⚠️</span>
        <p><strong>${t('remember')}</strong> ${t('rememberDesc')}</p>
      </div>
      <div style="display:flex;gap:.75rem;margin-top:.25rem">
        <button class="btn-restart" onclick="goRoleSelect()" style="flex:1">${t('changeRole')}</button>
        <button class="btn-restart" onclick="goIntro()" style="flex:1">${t('restart')}</button>
      </div>`;
  }
}

// ── Navigazione ───────────────────────────────────────────────
function goIntro() {
  state = {phase:'intro', roleId:null, qIndex:0, answers:{}, currentAnswer:'', selectedStyles:[], selectedOption:null};
  render();
}
function goRoleSelect() {
  state.phase = 'roleSelect';
  state.qIndex = 0; state.answers = {}; state.currentAnswer = ''; state.selectedStyles = []; state.selectedOption = null;
  render();
}
function startQuestions() {
  if (!state.roleId) return;
  state.phase = 'questions'; state.qIndex = 0; state.answers = {}; state.currentAnswer = ''; state.selectedStyles = []; state.selectedOption = null;
  render();
}
function goNext() {
  const qs = currentQuestions();
  const q = qs[state.qIndex];
  if (q.type === 'style') state.answers[q.id] = [...state.selectedStyles];
  else if (q.type === 'option') state.answers[q.id] = state.selectedOption;
  else state.answers[q.id] = state.currentAnswer.trim();

  if (state.qIndex < qs.length - 1) {
    state.qIndex++;
    const next = qs[state.qIndex];
    state.currentAnswer = state.answers[next.id] || '';
    state.selectedStyles = next.type==='style' ? [...(state.answers[next.id]||[])] : [];
    state.selectedOption = next.type==='option' ? (state.answers[next.id]||null) : null;
    render();
  } else {
    state.phase = 'result';
    render();
  }
}
function goPrev() {
  if (state.qIndex > 0) {
    state.qIndex--;
    const qs = currentQuestions();
    const p = qs[state.qIndex];
    state.currentAnswer = state.answers[p.id] || '';
    state.selectedStyles = p.type==='style' ? [...(state.answers[p.id]||[])] : [];
    state.selectedOption = p.type==='option' ? (state.answers[p.id]||null) : null;
    render();
  }
}

render();
updateLangButtons();

function updateZoomPosition() {
  const footer = document.querySelector('.footer');
  const controls = document.querySelector('.zoom-controls');
  if (footer && controls) {
    controls.style.bottom = (footer.offsetHeight + 16) + 'px';
  }
}
updateZoomPosition();
window.addEventListener('resize', updateZoomPosition);
</script>
